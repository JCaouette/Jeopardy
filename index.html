<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Handley-Thompson Jeopardy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@600;700&family=Barlow:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ═══════════════════ PASSWORD GATE ═══════════════════ -->
  <div id="screen-password" class="screen active">
    <div class="pw-wrap">
      <input type="password" id="pw-input" placeholder="Password" autocomplete="current-password">
      <div id="pw-error" class="pw-error hidden">Incorrect password. Try again.</div>
      <button class="btn btn-large btn-gold" id="btn-pw-submit">ENTER</button>
      <label class="pw-toggle">
        <input type="checkbox" id="pw-remember">
        <span class="pw-toggle-track"></span>
        <span class="pw-toggle-label">Remember on this device</span>
      </label>
    </div>
  </div>

  <!-- ═══════════════════ HOME SCREEN ═══════════════════ -->
  <div id="screen-home" class="screen">
    <div class="home-wrap">
      <h1 class="wordmark">HANDLEY-THOMPSON<br>JEOPARDY</h1>

      <div id="resume-banner" class="hidden">
        <button class="btn btn-large btn-gold" id="btn-resume"><span aria-hidden="true"><svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor" style="vertical-align:middle"><polygon points="5 3 19 12 5 21 5 3"/></svg></span> RESUME GAME</button>
        <div class="resume-hint">A game is in progress — resume it or start fresh below</div>
      </div>

      <!-- Question loading -->
      <div class="home-section load-section">
        <button class="btn btn-secondary" id="btn-template"><span aria-hidden="true"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle"><path d="M12 5v14M5 12l7 7 7-7"/></svg></span> Download Template</button>
        <label class="btn btn-secondary" id="label-upload">
          <span aria-hidden="true"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg></span> Load Questions
          <input type="file" id="file-upload" accept=".xlsx">
        </label>
        <button class="btn btn-secondary" id="btn-sample"><span aria-hidden="true"><svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor" style="vertical-align:middle"><polygon points="5 3 19 12 5 21 5 3"/></svg></span> Try Sample Game</button>
      </div>
      <div id="load-status" aria-live="polite"></div>

      <!-- Player setup -->
      <div class="home-section players-section">
        <h2 class="section-title">PLAYERS</h2>
        <div id="player-list"></div>
        <div class="add-player-row">
          <input type="text" id="new-player-input" placeholder="Enter player name…" maxlength="20" autocomplete="off">
          <button class="btn btn-gold" id="btn-add-player">+ Add</button>
        </div>
      </div>

      <button class="btn btn-large btn-gold" id="btn-start" disabled>START GAME</button>
    </div>
  </div>

  <!-- ═══════════════════ GAME SCREEN ═══════════════════ -->
  <div id="screen-game" class="screen">

    <!-- Scoreboard strip -->
    <div id="scoreboard">
      <div id="round-label">SINGLE JEOPARDY</div>
      <div id="score-players"></div>
      <div class="scoreboard-actions">
        <button class="btn btn-small btn-outline" id="btn-go-home">← Home</button>
        <button class="btn btn-small btn-outline" id="btn-next-round">Next Round →</button>
      </div>
    </div>

    <!-- Board grid -->
    <div id="board-wrap">
      <div id="board" role="grid" aria-label="Jeopardy board"></div>
    </div>

  </div>

  <!-- ═══════════════════ CLUE OVERLAY ═══════════════════ -->
  <div id="overlay-clue" class="overlay" role="dialog" aria-modal="true" aria-label="Clue" hidden>
    <button class="btn btn-outline btn-small overlay-close" id="btn-close-clue" aria-label="Cancel — return to board without using this question">✕ Cancel</button>
    <div class="clue-box">
      <div id="clue-meta"></div>
      <div id="clue-text"></div>

      <div id="clue-actions">
        <button class="btn btn-gold btn-large" id="btn-reveal-answer">Reveal Answer</button>
      </div>

      <div id="answer-section" hidden>
        <div id="answer-text"></div>
        <div id="player-buttons"></div>
        <button class="btn btn-gold btn-large" id="btn-done-clue">Done →</button>
      </div>
    </div>
  </div>

  <!-- ═══════════════════ DAILY DOUBLE OVERLAY ═══════════════════ -->
  <div id="overlay-dd" class="overlay" role="dialog" aria-modal="true" aria-label="Daily Double" hidden>
    <button class="btn btn-outline btn-small overlay-close" id="btn-close-dd" aria-label="Cancel Daily Double">✕</button>
    <div class="dd-box">
      <div class="dd-starburst" aria-hidden="true"><svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><polygon points="100,2 104,94 118,4 106,95 128,10 110,97 138,20 114,100 146,33 118,104 153,48 122,108 158,63 126,112 161,80 130,117 162,98 134,122 161,116 137,128 158,134 140,133 153,151 142,139 146,168 144,144 136,183 146,150 126,195 147,155 113,205 148,161 99,211 148,166 84,213 147,171 69,211 145,176 55,205 143,180 43,196 140,184 32,183 137,187 23,168 133,189 15,151 129,191 9,133 125,192 5,116 121,193 4,98 117,193 5,80 114,193 8,63 111,192 13,48 109,190 20,33 107,188 29,20 105,186 41,10 104,184 54,4 103,182 69,-4 102,179 85,-9 101,177 101,-11 101,175" fill="#FFD700"/></svg></div>
      <div class="dd-title">DAILY<br><span class="gold-em">DOUBLE!</span></div>
      <div id="dd-form" hidden>
        <div class="form-group">
          <label for="dd-player-select">Who found it?</label>
          <select id="dd-player-select"></select>
        </div>
        <div class="form-group">
          <label for="dd-wager-input">Wager ($)</label>
          <input type="number" id="dd-wager-input" min="5" step="1" placeholder="Enter wager">
          <div class="hint" id="dd-wager-hint"></div>
        </div>
        <button class="btn btn-gold btn-large" id="btn-dd-confirm">See Clue →</button>
      </div>
    </div>
  </div>

  <!-- ═══════════════════ FINAL JEOPARDY SCREEN ═══════════════════ -->
  <div id="screen-final" class="screen">
    <div class="final-wrap">
      <div class="final-header">FINAL JEOPARDY</div>
      <div id="final-content"></div>
    </div>
  </div>

  <!-- ═══════════════════ WINNER SCREEN ═══════════════════ -->
  <div id="screen-winner" class="screen">
    <canvas id="confetti-canvas"></canvas>
    <div class="winner-wrap">
      <h1 class="wordmark">HANDLEY-THOMPSON<br>JEOPARDY</h1>
      <h2 class="winner-title">FINAL STANDINGS</h2>
      <div id="winner-list"></div>
      <button class="btn btn-large btn-gold" id="btn-new-game">NEW GAME</button>
    </div>
  </div>

  <button id="mute-toggle" aria-label="Toggle sound" title="Toggle sound"><svg id="mute-icon-on" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg><svg id="mute-icon-off" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg></button>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="app.js"></script>
  <script>
    window.addEventListener('DOMContentLoaded', function () {
      document.getElementById('btn-go-home').addEventListener('click', function () {
        showScreen('home');
        dom.resumeBanner.classList.remove('hidden');
      });
    });
  </script>
</body>
</html>
